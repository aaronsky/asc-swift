name: SwiftPM

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/swiftpm.yml"
      - "Examples/**/*.swift"
      - "Package*"
      - "Sources/**/*.swift"
      - "Tests/**/*.swift"
  pull_request:
    paths:
      - ".github/workflows/swiftpm.yml"
      - "Examples/**/*.swift"
      - "Package*"
      - "Sources/**/*.swift"
      - "Tests/**/*.swift"
  workflow_dispatch: ~

concurrency:
  group: swiftpm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macOS:
    runs-on: macos-latest
    strategy:
      matrix:
        xcode: ["26.2"]
    env:
      DEVELOPER_DIR: /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer
    steps:
      - uses: actions/checkout@v6
      - run: swift -version
      - run: swift test --parallel
  Linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ["6.2"]
    container:
      image: swift:${{ matrix.tag }}
    steps:
      - uses: actions/checkout@v6
      - run: swift test --parallel
